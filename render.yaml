services:
  - type: web
    name: helix-biotech
    env: python
    buildCommand: chmod +x render-build.sh && ./render-build.sh
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: NODE_VERSION
        value: 20.11.0
